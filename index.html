<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vicki Portfolio</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="index-main" id="top">
    <div class="tab-stack">
      <section class="tile-wrap nav-wrap" id="nav-window">
        <article class="tile tile-light tile-nav-only">
          <div class="tile-content">
            <nav class="tile-nav">
              <div class="nav-links">
                <a href="./index.html">Home</a>
                <a href="./about.html">About</a>
                <a href="./work.html">Work</a>
                <a href="./playground.html">Playground</a>
                <a href="./cv.html">CV</a>
              </div>
              <a class="chip" href="./contact.html">Contact</a>
            </nav>
          </div>
        </article>
      </section>

      <section class="tile-wrap" id="home-window">
        <article class="tile tile-light tile-home">
          <img class="tile-media" src="./flower.gif" alt="Home" />
          <div class="tile-content">
            <div class="tile-center">
              <h2 class="home-title">VICKI, NICE<br />TO MEET YOU</h2>
            </div>
          </div>
        </article>
      </section>

      <section class="tile-wrap" id="about-window">
        <a class="tile tile-light tile-link" href="./about.html" aria-label="Open About section">
          <img class="tile-media" src="./about.gif" alt="About" />
          <div class="tile-content">
            <div class="tile-center">
              <h2>ABOUT</h2>
            </div>
          </div>
        </a>
      </section>

      <section class="tile-wrap" id="work-window">
        <a class="tile tile-light tile-link" href="./work.html" aria-label="Open Work section">
          <img class="tile-media" src="./events.gif" alt="Event production and activations" />
          <div class="tile-content">
            <div class="tile-center">
              <h2>EVENT PRODUCTION AND ACTIVATIONS</h2>
            </div>
          </div>
        </a>
      </section>

      <section class="tile-wrap" id="playground-window">
        <a class="tile tile-light tile-link" href="./playground.html" aria-label="Open Playground section">
          <img class="tile-media" src="./Playground.gif" alt="Playground" />
          <div class="tile-content">
            <div class="tile-center">
              <h2>PLAY-<br />GROUND</h2>
            </div>
          </div>
        </a>
      </section>

      <section class="tile-wrap" id="cv-window">
        <a class="tile tile-light tile-link" href="./cv.html" aria-label="Open CV section">
          <img class="tile-media tile-media--small" src="./cv.gif" alt="CV" />
          <div class="tile-content">
            <div class="tile-center">
              <h2>CV</h2>
            </div>
          </div>
        </a>
      </section>

      <section class="tile-wrap" id="contact-window">
        <a class="tile tile-light tile-link" href="./contact.html" aria-label="Open Contact section">
          <img class="tile-media tile-media--xsmall" src="./contact.gif" alt="Contact" />
          <div class="tile-content">
            <div class="tile-center">
              <h2>CONTACT</h2>
            </div>
          </div>
        </a>
      </section>
    </div>

    <footer class="legacy-footer">
      <div class="legacy-marquee">
        <h2>Get To Know Me</h2>
      </div>
      <div class="legacy-marquee email">
        <h2>Victoriagatlin1@gmail.com</h2>
      </div>
      <nav class="legacy-links">
        <a href="./index.html">Home</a>
        <a href="https://www.linkedin.com/in/victoriagatlinj" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://www.instagram.com/vicki_gatlinj/" target="_blank" rel="noopener">Instagram</a>
      </nav>
    </footer>
  </main>
  <script defer src="./lightbox.js"></script>
</body>
</html>
